# /etc/nginx/sites-available/smartvet-callcentre
# Place this file on the VPS and symlink:
#   sudo ln -s /etc/nginx/sites-available/smartvet-callcentre /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOURDOMAIN below with the actual domain (e.g. callcentre.smartvet.africa)
# SSL is handled by Certbot — run:
#   sudo certbot --nginx -d YOURDOMAIN

server {
    listen 80;
    server_name YOURDOMAIN;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOURDOMAIN;

    # Certbot fills these in automatically after `certbot --nginx`
    # ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Increase upload limit for audio/call recordings if needed
    client_max_body_size 50M;

    # ── WebSocket upgrade (Twilio / live call events) ───────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:4600;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── REST API → Express backend (port 4600) ───────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:4600;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Twilio webhooks → backend ────────────────────────────────────────────
    location /twilio {
        proxy_pass         http://127.0.0.1:4600;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA (served by Docker frontend container on port 5174) ─────────
    location / {
        proxy_pass         http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            proxy_pass http://127.0.0.1:5174;
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
