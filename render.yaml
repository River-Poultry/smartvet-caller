services:
  - type: web
    name: smartvet-callcenter-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartvet-callcenter-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        value: https://smartvet-caller.vercel.app
      - key: SMARTVET_CORE_API
        value: https://smartvet.africa
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: AI_MODEL_URL
        sync: false

databases:
  - name: smartvet-callcenter-db
    databaseName: smartvet_callcenter
    user: smartvet
    plan: free
    region: oregon
